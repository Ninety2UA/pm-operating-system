  <!-- Arrow -->
  <line x1="133" y1="37" x2="152" y2="37" stroke="#6B7280" stroke-width="2" marker-end="url(#pipe-arrow)"/>

  <!-- Stage 2: Lean Canvas -->
  <rect x="157" y="10" width="128" height="55" rx="6" fill="#C9B896" stroke="#A89A72" stroke-width="1.5"/>
