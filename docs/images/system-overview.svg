<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 160">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" opacity="0.5"/>
    </marker>
  </defs>

  <!-- INPUT node -->
  <rect x="0" y="45" width="160" height="70" rx="6" fill="#C9E4CA" stroke="#5C8A5E" stroke-width="1.5"/>
  <text x="80" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#3D6B3F" text-anchor="middle" letter-spacing="0.5">INPUT</text>
  <text x="80" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="500">BACKLOG.md</text>

  <!-- Arrow 1 -->
  <line x1="165" y1="80" x2="210" y2="80" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PROCESSING node -->
  <rect x="215" y="45" width="170" height="70" rx="6" fill="#B8D4E3" stroke="#4A7C9B" stroke-width="1.5"/>
  <text x="300" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2D5F7A" text-anchor="middle" letter-spacing="0.5">PROCESSING</text>
  <text x="300" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="500">/process-backlog</text>

  <!-- Arrow 2 (splits to Tasks and Projects) -->
  <line x1="390" y1="80" x2="435" y2="55" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="80" x2="435" y2="105" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- WORK group -->
  <rect x="440" y="20" width="150" height="120" rx="6" fill="none" stroke="#B8956A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="515" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#B8956A" text-anchor="middle" letter-spacing="0.5">WORK</text>

  <!-- Tasks node -->
  <rect x="455" y="30" width="120" height="40" rx="5" fill="#FFE4B5" stroke="#D4A574" stroke-width="1.5"/>
  <text x="515" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="500">Tasks</text>

  <!-- Projects node -->
  <rect x="455" y="90" width="120" height="40" rx="5" fill="#FFE4B5" stroke="#D4A574" stroke-width="1.5"/>
  <text x="515" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="500">Projects</text>

  <!-- MCP node -->
  <rect x="640" y="45" width="175" height="70" rx="6" fill="#D4A574" stroke="#B8956A" stroke-width="1.5"/>
  <text x="727" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6B4226" text-anchor="middle" letter-spacing="0.5">MCP SERVER</text>
  <text x="727" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1a1a2e" text-anchor="middle" font-weight="500">manager-ai &middot; 10 tools</text>

  <!-- Dashed arrows from MCP to Tasks/Projects -->
  <line x1="637" y1="65" x2="578" y2="50" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)" opacity="0.6"/>
  <line x1="637" y1="95" x2="578" y2="110" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)" opacity="0.6"/>
</svg>
