<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#5ea4f8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5ea4f8"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#7c5cfc" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="200" cy="160" r="120" fill="#7c5cfc" opacity="0.06" filter="url(#softglow)"/>
  <circle cx="1000" cy="160" r="120" fill="#5ea4f8" opacity="0.06" filter="url(#softglow)"/>

  <!-- Icon: layered squares representing the OS layers -->
  <g transform="translate(440, 55)" filter="url(#glow)">
    <!-- Back layer -->
    <rect x="30" y="30" width="50" height="50" rx="8" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.5"/>
    <!-- Middle layer -->
    <rect x="15" y="15" width="50" height="50" rx="8" fill="none" stroke="#5ea4f8" stroke-width="2" opacity="0.7"/>
    <!-- Front layer -->
    <rect x="0" y="0" width="50" height="50" rx="8" fill="none" stroke="#7c5cfc" stroke-width="2.5"/>
    <!-- Checkmark in front -->
    <polyline points="14,27 24,37 40,17" fill="none" stroke="#7c5cfc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-1">
    PM Operating System
  </text>

  <!-- Subtitle -->
  <text x="600" y="185" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#a0a0c0" letter-spacing="0.5">
    AI-powered productivity plugin for Claude Code
  </text>

  <!-- Accent line -->
  <rect x="450" y="205" width="300" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Stats pills -->
  <g transform="translate(310, 230)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#7c5cfc" opacity="0.15"/>
    <text x="60" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">19 Skills</text>
  </g>
  <g transform="translate(450, 230)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#5ea4f8" opacity="0.15"/>
    <text x="65" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#7db8f8">6 Commands</text>
  </g>
  <g transform="translate(600, 230)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#4ecdc4" opacity="0.15"/>
    <text x="55" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6ee0d8">3 Agents</text>
  </g>
  <g transform="translate(730, 230)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="#7c5cfc" opacity="0.15"/>
    <text x="75" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">MCP Server</text>
  </g>

  <!-- Bottom tag -->
  <text x="600" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#606080" letter-spacing="2">
    GOALS  &#x2022;  TASKS  &#x2022;  PROJECTS  &#x2022;  KNOWLEDGE  &#x2022;  COMPOUNDING
  </text>
</svg>
