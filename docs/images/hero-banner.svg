<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#E8D5C4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" rx="12" fill="url(#bg)"/>

  <!-- Decorative grid dots — top-left -->
  <g opacity="0.08" fill="#D4A574">
    <circle cx="40" cy="40" r="2"/><circle cx="80" cy="40" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="160" cy="40" r="2"/><circle cx="200" cy="40" r="2"/><circle cx="240" cy="40" r="2"/><circle cx="280" cy="40" r="2"/><circle cx="320" cy="40" r="2"/>
    <circle cx="40" cy="80" r="2"/><circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="200" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="280" cy="80" r="2"/><circle cx="320" cy="80" r="2"/>
    <circle cx="40" cy="120" r="2"/><circle cx="80" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/><circle cx="200" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="280" cy="120" r="2"/><circle cx="320" cy="120" r="2"/>
  </g>

  <!-- Decorative grid dots — bottom-right -->
  <g opacity="0.08" fill="#D4A574">
    <circle cx="880" cy="220" r="2"/><circle cx="920" cy="220" r="2"/><circle cx="960" cy="220" r="2"/><circle cx="1000" cy="220" r="2"/><circle cx="1040" cy="220" r="2"/><circle cx="1080" cy="220" r="2"/><circle cx="1120" cy="220" r="2"/><circle cx="1160" cy="220" r="2"/>
    <circle cx="880" cy="260" r="2"/><circle cx="920" cy="260" r="2"/><circle cx="960" cy="260" r="2"/><circle cx="1000" cy="260" r="2"/><circle cx="1040" cy="260" r="2"/><circle cx="1080" cy="260" r="2"/><circle cx="1120" cy="260" r="2"/><circle cx="1160" cy="260" r="2"/>
    <circle cx="880" cy="300" r="2"/><circle cx="920" cy="300" r="2"/><circle cx="960" cy="300" r="2"/><circle cx="1000" cy="300" r="2"/><circle cx="1040" cy="300" r="2"/><circle cx="1080" cy="300" r="2"/><circle cx="1120" cy="300" r="2"/><circle cx="1160" cy="300" r="2"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="100" width="60" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="80" y="155" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#FEFCF9" letter-spacing="-1">
    PM Operating System
  </text>

  <!-- Subtitle -->
  <text x="80" y="195" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#D4A574" font-weight="400">
    AI-powered productivity plugin for Claude Code
  </text>

  <!-- Stat pills -->
  <g transform="translate(80, 225)">
    <rect width="95" height="30" rx="15" fill="none" stroke="#D4A574" stroke-width="1.5" opacity="0.6"/>
    <text x="47" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#D4A574" text-anchor="middle">19 Skills</text>

    <rect x="110" width="120" height="30" rx="15" fill="none" stroke="#D4A574" stroke-width="1.5" opacity="0.6"/>
    <text x="170" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#D4A574" text-anchor="middle">6 Commands</text>

    <rect x="245" width="95" height="30" rx="15" fill="none" stroke="#D4A574" stroke-width="1.5" opacity="0.6"/>
    <text x="292" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#D4A574" text-anchor="middle">3 Agents</text>

    <rect x="355" width="90" height="30" rx="15" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
    <text x="400" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">Plugin</text>
  </g>

  <!-- Terminal illustration -->
  <g transform="translate(660, 30)">
    <rect width="490" height="280" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="490" height="32" rx="8" fill="#161b22"/>
    <rect y="24" width="490" height="8" fill="#161b22"/>
    <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="16" r="6" fill="#febc2e"/>
    <circle cx="60" cy="16" r="6" fill="#28c840"/>
    <text x="245" y="20" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">claude</text>

    <!-- Terminal content -->
    <text x="16" y="60" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#8b949e">$</text>
    <text x="30" y="60" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#D4A574"> claude</text>

    <text x="16" y="88" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7ee787">&#x276F;</text>
    <text x="30" y="88" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#c9d1d9"> /morning</text>

    <text x="30" y="113" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Syncing 3 new meetings...</text>
    <text x="30" y="133" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Top 5 tasks loaded</text>
    <text x="30" y="153" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Pipeline: 2 projects ready</text>
    <text x="30" y="173" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  OKR alignment: 4/5 tasks on track</text>
    <text x="30" y="193" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#7ee787">  &#x2713; Journal saved</text>

    <text x="16" y="221" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7ee787">&#x276F;</text>
    <text x="30" y="221" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#c9d1d9"> /launch my-project</text>

    <text x="30" y="246" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Running validation...</text>

    <!-- Blinking cursor -->
    <rect x="210" y="233" width="8" height="16" fill="#D4A574" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
